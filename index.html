<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Speed Reader - RSVP Reader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>read fast.</h1>
    </div>

    <!-- word display -->
    <div class="screen">
        <div class="word" id="wordDisplay">📖</div>
    </div>

    <!-- playback controls -->
    <div class="controls">
        <button id="skipBackwardBtn">⏮</button>
        <button id="decrementWPMBtn">-</button>
        <button id="pauseBtn">⏸</button>
        <button id="playBtn" class="primary">▶</button>
        <button id="incrementWPMBtn">+</button>
        <button id="skipForwardBtn">⏭</button>
        <button id="resetBtn" class="danger">⟳</button>
        <button id="themeToggle" class="theme-btn" aria-label="Toggle dark/light mode">🌙</button>
        <button id="fontToggle" class="font-btn" aria-label="Toggle sans/serif mode">abc</button>
    </div>

    <!-- text input -->
    <div class="text-input-area">
        <textarea id="textInput" rows="4" placeholder="Paste or type any text here...&#10;Example: The quick brown fox jumps over the lazy dog. Speed reading displays each word one by one. Focus on the center of the screen!"></textarea>
        <div class="footer-buttons">
            <button id="loadTextBtn">📋 LOAD TEXT</button>
            <button id="sampleTextBtn">✨ SAMPLE</button>
        </div>
    </div>
    <div class="status" id="statusMsg">
        ✅ Ready | Load text & press PLAY
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
