<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Speed Reader - RSVP Reader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>⚡ SPEED READER</h1>
    <div class="sub">RSVP · rapid serial visual presentation</div>

    <!-- word display -->
    <div class="screen">
        <div class="word" id="wordDisplay">📖</div>
    </div>

    <!-- playback controls -->
    <div class="controls">
        <button id="playBtn" class="primary">▶ PLAY</button>
        <button id="pauseBtn">⏸ PAUSE</button>
        <button id="resetBtn" class="danger">⟳ RESET</button>
    </div>

    <!-- speed slider -->
    <div class="speed-control">
        <span class="speed-label">⚡ READING SPEED</span>
        <input type="range" id="wpmSlider" min="100" max="800" step="10" value="300">
        <span id="wpmValue">300 WPM</span>
    </div>

    <!-- text input -->
    <div class="text-input-area">
        <textarea id="textInput" rows="4" placeholder="Paste or type any text here...&#10;Example: The quick brown fox jumps over the lazy dog. Speed reading displays each word one by one. Focus on the center of the screen!"></textarea>
        <div class="footer-buttons">
            <button id="loadTextBtn">📋 LOAD TEXT</button>
            <button id="sampleTextBtn">✨ SAMPLE</button>
        </div>
    </div>
    <div class="status" id="statusMsg">
        ✅ Ready | Load text & press PLAY
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
