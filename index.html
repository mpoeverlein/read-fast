<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Speed Reader - RSVP Reader</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* Prevents accidental highlighting while reading */
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0 0 8px 0;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a5f3fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 24px;
            border-bottom: 1px dashed #334155;
            padding-bottom: 12px;
        }

        /* Word display area */
        .screen {
            background: #0f172a;
            border-radius: 32px;
            padding: 60px 20px;
            margin-bottom: 24px;
            text-align: center;
            border: 2px solid #334155;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2), 0 8px 20px rgba(0,0,0,0.2);
        }

        .word {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #facc15;
            word-break: break-word;
            transition: all 0.05s ease;
            font-family: 'Courier New', 'Fira Code', monospace;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        button {
            background: #1e293b;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.96);
        }

        button.primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px #3b82f640;
        }

        button.primary:active {
            background: #2563eb;
        }

        button.danger {
            background: #ef4444;
        }

        .speed-control {
            background: #0f172a;
            padding: 12px 16px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .speed-label {
            color: #cbd5e1;
            font-weight: 500;
        }

        input[type="range"] {
            width: 200px;
            height: 4px;
            border-radius: 10px;
            background: #334155;
        }

        #wpmValue {
            background: #00000066;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: bold;
            color: #facc15;
            min-width: 70px;
            text-align: center;
        }

        /* text input area */
        .text-input-area {
            background: #0f172a;
            border-radius: 28px;
            padding: 12px;
            margin-top: 12px;
        }

        textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            color: #f1f5f9;
            padding: 14px;
            border-radius: 24px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .status {
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 16px;
        }

        .footer-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 12px;
        }

        @media (max-width: 550px) {
            .word {
                font-size: 2.4rem;
            }
            .screen {
                padding: 40px 15px;
            }
            button {
                padding: 8px 14px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ SPEED READER</h1>
    <div class="sub">RSVP · rapid serial visual presentation</div>

    <!-- word display -->
    <div class="screen">
        <div class="word" id="wordDisplay">📖</div>
    </div>

    <!-- playback controls -->
    <div class="controls">
        <button id="playBtn" class="primary">▶ PLAY</button>
        <button id="pauseBtn">⏸ PAUSE</button>
        <button id="resetBtn" class="danger">⟳ RESET</button>
    </div>

    <!-- speed slider -->
    <div class="speed-control">
        <span class="speed-label">⚡ READING SPEED</span>
        <input type="range" id="wpmSlider" min="100" max="800" step="10" value="300">
        <span id="wpmValue">300 WPM</span>
    </div>

    <!-- text input -->
    <div class="text-input-area">
        <textarea id="textInput" rows="4" placeholder="Paste or type any text here...&#10;Example: The quick brown fox jumps over the lazy dog. Speed reading displays each word one by one. Focus on the center of the screen!"></textarea>
        <div class="footer-buttons">
            <button id="loadTextBtn">📋 LOAD TEXT</button>
            <button id="sampleTextBtn">✨ SAMPLE</button>
        </div>
    </div>
    <div class="status" id="statusMsg">
        ✅ Ready | Load text & press PLAY
    </div>
</div>

<script>
    // ---------- SPEED READING ENGINE ----------
    let wordsArray = [];        // array of words
    let currentIndex = 0;      // current word position
    let isPlaying = false;
    let timer = null;
    let currentWPM = 300;       // default

    // DOM elements
    const wordDisplay = document.getElementById('wordDisplay');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const wpmSlider = document.getElementById('wpmSlider');
    const wpmValueSpan = document.getElementById('wpmValue');
    const textInput = document.getElementById('textInput');
    const loadTextBtn = document.getElementById('loadTextBtn');
    const sampleTextBtn = document.getElementById('sampleTextBtn');
    const statusMsg = document.getElementById('statusMsg');

    // helper: calculate delay in ms based on WPM
    function getDelayMs() {
        if (currentWPM <= 0) return 200;
        // words per minute -> milliseconds per word
        return 60000 / currentWPM;
    }

    // stop any running timer
    function stopTimer() {
        if (timer) {
            clearInterval(timer);
            timer = null;
        }
        isPlaying = false;
    }

    // display current word (based on currentIndex)
    function displayCurrentWord() {
        if (wordsArray.length === 0) {
            wordDisplay.innerText = '📖';
            return;
        }
        if (currentIndex >= wordsArray.length) {
            // finished reading
            wordDisplay.innerText = '🏁 THE END';
            stopTimer();
            statusMsg.innerText = '✅ Finished! Load new text or reset.';
            return;
        }
        let word = wordsArray[currentIndex];
        // optional: keep punctuation attached to words (already split by spaces)
        wordDisplay.innerText = word;
    }

    // main tick: move to next word
    function nextWord() {
        if (!isPlaying) return;
        if (wordsArray.length === 0) {
            stopTimer();
            statusMsg.innerText = '⚠️ No text loaded. Paste something first.';
            wordDisplay.innerText = '📭';
            return;
        }
        
        if (currentIndex < wordsArray.length) {
            currentIndex++;
            displayCurrentWord();
            
            // if after increment we reached the end, stop playing
            if (currentIndex >= wordsArray.length) {
                stopTimer();
                statusMsg.innerText = '🎉 Complete! Great job.';
                wordDisplay.innerText = '✨ DONE ✨';
            }
        } else {
            // safety stop
            stopTimer();
        }
    }

    // start reading from current position
    function startReading() {
        if (wordsArray.length === 0) {
            statusMsg.innerText = '❌ No text loaded. Paste or load sample text.';
            return;
        }
        if (currentIndex >= wordsArray.length) {
            statusMsg.innerText = '🔄 End reached. Press RESET to start over.';
            return;
        }
        if (isPlaying) return; // already playing
        
        stopTimer(); // clear any existing timer just in case
        
        isPlaying = true;
        const delay = getDelayMs();
        timer = setInterval(() => {
            nextWord();
        }, delay);
        statusMsg.innerText = `▶️ Reading at ${currentWPM} WPM | word ${currentIndex+1}/${wordsArray.length}`;
    }

    // pause reading
    function pauseReading() {
        if (!isPlaying) return;
        stopTimer();
        statusMsg.innerText = `⏸ Paused at word ${currentIndex+1}/${wordsArray.length}`;
    }

    // reset to first word
    function resetReading() {
        const wasPlaying = isPlaying;
        stopTimer();          // stop playback
        currentIndex = 0;
        displayCurrentWord();
        if (wordsArray.length > 0) {
            statusMsg.innerText = `⟳ Reset to start. ${wordsArray.length} words loaded.`;
        } else {
            statusMsg.innerText = `⟳ Reset, but no text loaded.`;
        }
        // if was playing, optionally restart? better to keep stopped: user can press play.
    }

    // load text from textarea into wordsArray
    function loadTextFromInput() {
        const rawText = textInput.value;
        if (!rawText.trim()) {
            statusMsg.innerText = '⚠️ Please paste some text first.';
            return false;
        }
        
        // split by spaces but also keep punctuation attached to words (natural RSVP)
        // advanced: split on whitespace (spaces, newlines, tabs)
        let words = rawText.trim().split(/\s+/);
        // filter out any empty strings
        words = words.filter(w => w.length > 0);
        
        if (words.length === 0) {
            statusMsg.innerText = '❌ No valid words found.';
            return false;
        }
        
        wordsArray = words;
        currentIndex = 0;
        stopTimer();            // stop any ongoing playback
        displayCurrentWord();
        statusMsg.innerText = `📚 Loaded ${wordsArray.length} words. Press PLAY.`;
        return true;
    }
    
    // load sample text (classic literature / speed reading demo)
    function loadSampleText() {
        const sample = `The art of reading rapidly is not about skipping meaning but about reducing subvocalization and expanding peripheral vision. When you see one word at a time, your brain can process faster without regression. This method is called RSVP - Rapid Serial Visual Presentation. Studies show that with practice, comprehension remains high even at 500 to 700 words per minute. Trust your eyes and let the words flow. Speed reading is a superpower hiding in plain sight. Enjoy the journey!`;
        textInput.value = sample;
        loadTextFromInput();
    }
    
    // update WPM and if currently playing, restart timer with new speed
    function updateWPM(value) {
        currentWPM = value;
        wpmValueSpan.innerText = `${currentWPM} WPM`;
        
        // if currently playing, we need to restart timer to apply new speed
        if (isPlaying && wordsArray.length > 0 && currentIndex < wordsArray.length) {
            // preserve playing state, but restart timer with new delay
            const wasPlaying = isPlaying;
            if (wasPlaying) {
                stopTimer();       // clear old interval
                isPlaying = true;  // restore flag
                const newDelay = getDelayMs();
                timer = setInterval(() => {
                    nextWord();
                }, newDelay);
                statusMsg.innerText = `⚡ Speed changed to ${currentWPM} WPM (continuing)`;
            }
        } else if (!isPlaying) {
            // just update display, no timer restart needed
            statusMsg.innerText = `⚙️ Speed set to ${currentWPM} WPM`;
        }
    }
    
    // event listeners
    playBtn.addEventListener('click', () => {
        startReading();
    });
    
    pauseBtn.addEventListener('click', () => {
        pauseReading();
    });
    
    resetBtn.addEventListener('click', () => {
        resetReading();
    });
    
    wpmSlider.addEventListener('input', (e) => {
        const val = parseInt(e.target.value, 10);
        updateWPM(val);
    });
    
    loadTextBtn.addEventListener('click', () => {
        loadTextFromInput();
    });
    
    sampleTextBtn.addEventListener('click', () => {
        loadSampleText();
    });
    
    // also handle when text loads via manual paste & load button (already covered)
    // initial state: show sample text on first load? For user friendly, preload a simple demo text
    (function init() {
        // set a simple intro text but not overwhelming
        const introText = "Welcome to Speed Reader! Paste any article, book excerpt, or story. The words will flash one at a time. Click PLAY to start. Adjust speed with slider. This method boosts reading speed dramatically. Have fun and train your brain.";
        textInput.value = introText;
        loadTextFromInput();
        currentWPM = 300;
        wpmSlider.value = 300;
        wpmValueSpan.innerText = "300 WPM";
    })();
</script>
</body>
</html>
